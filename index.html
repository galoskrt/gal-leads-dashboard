<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>לידים — גל הרוש</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#010101;
  --s1:#0c0714;
  --s2:#130d1e;
  --s3:#1a1228;
  --border:rgba(177,59,255,.2);
  --border2:rgba(177,59,255,.35);
  --accent:#B13BFF;
  --accent2:#FF7EE2;
  --orange:#FF9000;
  --purple:#62109F;
  --green:#22c55e;
  --yellow:#FF9000;
  --red:#ff4d6d;
  --gray:rgba(255,255,255,.35);
  --text:#FFFFFF;
  --text2:rgba(255,255,255,.55);
  --r:12px;
  --wa:#25d366;
  --grad:linear-gradient(135deg,#B13BFF,#FF7EE2);
  --grad2:linear-gradient(135deg,#FF9000,#FF7EE2);
  --glow:0 0 20px rgba(177,59,255,.25);
}
body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}

/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 60% 0%,rgba(98,16,159,.35) 0%,transparent 60%),radial-gradient(ellipse at 20% 100%,rgba(177,59,255,.2) 0%,transparent 50%),var(--bg)}
.login-card{background:var(--s1);border:1px solid var(--border2);border-radius:24px;padding:44px 36px;width:100%;max-width:390px;text-align:center;box-shadow:0 0 60px rgba(177,59,255,.15),0 24px 60px rgba(0,0,0,.6)}
.login-logo{font-size:38px;margin-bottom:10px;filter:drop-shadow(0 0 12px #B13BFF)}
.login-title{font-size:24px;font-weight:900;margin-bottom:4px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:30px}
.lf{margin-bottom:15px;text-align:right}
.lf label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.lf input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;color:var(--text);font-size:14px;outline:none;font-family:inherit;direction:ltr;text-align:left;transition:.15s}
.lf input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(177,59,255,.12)}
.login-btn{width:100%;background:var(--grad);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;font-family:inherit;transition:.15s;box-shadow:0 4px 20px rgba(177,59,255,.35)}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(177,59,255,.5)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-err{color:var(--red);font-size:13px;margin-top:10px;min-height:20px}
.login-info{color:var(--text2);font-size:12px;margin-top:8px}

/* ── HEADER ── */
header{background:rgba(12,7,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:10px;flex-wrap:wrap}
.logo{font-size:16px;font-weight:900;white-space:nowrap;display:flex;align-items:center;gap:7px}
.logo-mark{width:28px;height:28px;border-radius:8px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 12px rgba(177,59,255,.4)}
.logo span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hstats{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.hstat{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;color:var(--text2);white-space:nowrap}.hstat b{color:var(--text)}
.hstat.warn{border-color:rgba(255,77,109,.4);color:var(--red)}.hstat.warn b{color:var(--red)}
.hstat.todayc{border-color:rgba(255,144,0,.4);color:var(--orange)}.hstat.todayc b{color:var(--orange)}
.hright{display:flex;align-items:center;gap:8px}
.sync-time{font-size:11px;color:var(--gray)}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit;transition:.15s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* ── TOOLBAR ── */
.toolbar{background:rgba(12,7,20,.8);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:.15s;font-family:inherit;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 3px 14px rgba(177,59,255,.35)}
.btn-primary:hover{box-shadow:0 4px 20px rgba(177,59,255,.55);transform:translateY(-1px)}
.btn-wa{background:var(--wa);color:#fff;box-shadow:0 3px 12px rgba(37,211,102,.3)}
.btn-wa:hover{box-shadow:0 4px 18px rgba(37,211,102,.5)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:rgba(177,59,255,.06)}
.btn-red{background:var(--red);color:#fff}
.btn-sm{padding:6px 10px;font-size:12px}
.search{flex:1;min-width:140px;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:8px 13px;color:var(--text);font-size:13px;outline:none;font-family:inherit;transition:.15s}
.search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(177,59,255,.1)}
.search::placeholder{color:var(--gray)}
select.sel{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:8px 10px;color:var(--text2);font-size:13px;cursor:pointer;outline:none;font-family:inherit;transition:.15s}
select.sel:focus{border-color:var(--accent)}

/* ── TABLE ── */
.wrap{padding:16px 20px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:580px}
thead th{text-align:right;padding:10px 11px;font-size:11px;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;background:rgba(12,7,20,.7);letter-spacing:.04em;text-transform:uppercase}
thead th:hover{color:var(--accent)}
tbody tr{border-bottom:1px solid rgba(177,59,255,.08);cursor:pointer;transition:.12s}
tbody tr:hover{background:rgba(177,59,255,.06);border-bottom-color:var(--border)}
tbody td{padding:12px 11px;vertical-align:middle}

/* ── MOBILE ── */
@media(max-width:680px){
  .wrap{padding:10px}
  table,thead,tbody,tr,td{display:block}
  thead{display:none}
  tbody tr{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;display:grid;grid-template-columns:1fr 1fr;gap:6px}
  tbody tr:hover{border-color:var(--accent);box-shadow:0 0 16px rgba(177,59,255,.15)}
  tbody td{padding:4px 0;border:none;font-size:13px;display:flex;flex-direction:column;gap:2px}
  tbody td::before{content:attr(data-label);color:var(--text2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  tbody td:first-child{display:none}
  .td-wa{grid-column:1/-1}
  .toolbar{gap:6px}
  .search{min-width:100px}
  header{padding:10px 14px}
}

/* ── BADGES ── */
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;letter-spacing:.02em}
.s-new{background:rgba(177,59,255,.15);color:#d494ff;border:1px solid rgba(177,59,255,.3)}
.s-no1,.s-no2,.s-no3,.s-no4{background:rgba(255,77,109,.12);color:#ff8099;border:1px solid rgba(255,77,109,.25)}
.s-cold-fu{background:rgba(100,160,255,.1);color:#80b8ff;border:1px solid rgba(100,160,255,.2)}
.s-hot-fu{background:rgba(255,144,0,.12);color:#ffb347;border:1px solid rgba(255,144,0,.25)}
.s-relevant{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.s-proposal{background:rgba(255,126,226,.12);color:#ff9ee7;border:1px solid rgba(255,126,226,.25)}
.s-quest{background:rgba(103,232,249,.1);color:#67e8f9;border:1px solid rgba(103,232,249,.2)}
.s-meeting{background:rgba(255,144,0,.12);color:#FF9000;border:1px solid rgba(255,144,0,.3)}
.s-won{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.35)}
.s-irrelevant{background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.1)}
.s-invalid{background:rgba(177,59,255,.08);color:rgba(177,59,255,.6);border:1px solid rgba(177,59,255,.15)}

/* ── REMINDER DOT ── */
.rdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-left:5px;vertical-align:middle}
.rdot.due{background:var(--orange);box-shadow:0 0 6px var(--orange);animation:pulse 1.5s infinite}
.rdot.overdue{background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse 1s infinite}
.rdot.ok{background:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── OVERLAY & MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:580px;padding:24px;margin:auto;box-shadow:0 0 40px rgba(177,59,255,.15),0 20px 60px rgba(0,0,0,.7)}
.modal h2{font-size:17px;font-weight:800;margin-bottom:18px;padding-bottom:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal-close{background:transparent;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;-webkit-text-fill-color:var(--text2)}
.modal-close:hover{-webkit-text-fill-color:var(--text)}
@media(max-width:680px){
  .overlay{padding:0;align-items:flex-end}
  .modal{border-radius:20px 20px 0 0;max-height:96vh;overflow-y:auto}
}

/* ── FORM ── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.fg.one{grid-template-columns:1fr}
.fg.three{grid-template-columns:1fr 1fr 1fr}
@media(max-width:480px){.fg,.fg.three{grid-template-columns:1fr}}
.f label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.f input,.f select,.f textarea{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit;direction:rtl;transition:.15s}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(177,59,255,.1)}
.f textarea{resize:vertical;min-height:70px}
.f input[type=url]{direction:ltr;text-align:left}
.f input[type=date],.f input[type=time]{direction:ltr;text-align:left}

/* ── MEETING SECTION ── */
.meeting-box{background:rgba(255,144,0,.06);border:1px solid rgba(255,144,0,.25);border-radius:12px;padding:14px;margin-bottom:11px}
.meeting-box h4{font-size:12px;color:#FF9000;margin-bottom:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}

/* ── RELEVANT SECTION ── */
.relevant-box{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.25);border-radius:12px;padding:14px;margin-bottom:11px}
.relevant-box h4{font-size:12px;color:#4ade80;margin-bottom:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}

/* ── REMINDER ── */
.rem-box{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:11px}
.rem-box h4{font-size:12px;color:var(--text2);margin-bottom:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.rem-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.rem-row input{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;font-family:inherit;direction:ltr;transition:.15s}
.rem-row input:focus{border-color:var(--accent)}
.rem-row .rnote-in{flex:1;min-width:90px;direction:rtl}
.saved-rem{margin-top:9px;font-size:12px;color:var(--orange);display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* ── HISTORY ── */
.hist{margin-bottom:11px}
.hist h4{font-size:12px;color:var(--text2);margin-bottom:7px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.hitem{display:flex;gap:7px;align-items:center;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:7px 11px;margin-bottom:5px;font-size:12px;flex-wrap:wrap}
.hdate{color:var(--text2);font-size:11px;white-space:nowrap}
.hres{font-weight:700;white-space:nowrap;color:var(--accent2)}
.hnote{color:var(--text2);flex:1;font-size:11px}
.hadd{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.hadd input,.hadd select{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 9px;color:var(--text);font-size:12px;outline:none;font-family:inherit;transition:.15s}
.hadd input:focus,.hadd select:focus{border-color:var(--accent)}
.hadd .hn-in{flex:1;min-width:80px}

/* ── MODAL ACTIONS ── */
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap}

/* ── WHATSAPP MODAL ── */
.wa-modal{max-width:440px}
.wa-info{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:13px;display:flex;align-items:center;gap:11px}
.wa-av{width:42px;height:42px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;flex-shrink:0;box-shadow:0 0 14px rgba(177,59,255,.3)}
.wa-nm{font-weight:800;margin-bottom:2px}
.wa-ph{font-size:12px;color:var(--text2);direction:ltr}
.wa-ta{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:13px;color:var(--text);font-size:14px;outline:none;font-family:inherit;resize:vertical;min-height:130px;line-height:1.65;direction:rtl;transition:.15s}
.wa-ta:focus{border-color:var(--wa);box-shadow:0 0 0 3px rgba(37,211,102,.1)}
.wa-chars{font-size:11px;color:var(--gray);text-align:left;margin-top:4px}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border2);border-radius:14px;padding:12px 18px;z-index:999;font-size:13px;display:none;gap:10px;align-items:center;max-width:370px;width:92%;box-shadow:0 8px 40px rgba(177,59,255,.2),0 4px 20px rgba(0,0,0,.6)}
.toast.show{display:flex;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateX(-50%) translateY(12px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.toast-x{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0 2px;line-height:1}

/* ── SAVING ── */
.saving{position:fixed;bottom:14px;right:14px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:6px 13px;font-size:12px;color:var(--accent2);display:none;z-index:100;box-shadow:0 4px 16px rgba(177,59,255,.15)}
.saving.show{display:block;animation:pulse .8s infinite}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty h3{font-size:18px;font-weight:800;margin-bottom:8px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── FOLLOWUP PROMPT BANNER ── */
.fu-banner{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.82);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.fu-banner.open{display:flex}
.fu-card{background:var(--s1);border:1px solid var(--border2);border-radius:22px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 0 50px rgba(177,59,255,.2),0 20px 60px rgba(0,0,0,.7);text-align:center}
.fu-icon{font-size:38px;margin-bottom:10px}
.fu-q{font-size:17px;font-weight:800;margin-bottom:6px;line-height:1.4}
.fu-name{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.fu-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
.fu-btns{display:flex;flex-direction:column;gap:9px}
.fu-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.fu-btn.yes{background:var(--green);color:#000}
.fu-btn.yes:hover{background:#16a34a;transform:translateY(-1px)}
.fu-btn.no{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}
.fu-btn.no:hover{background:rgba(255,77,109,.25)}
.fu-btn.reschedule{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.fu-btn.reschedule:hover{border-color:var(--accent);color:var(--accent)}
.fu-skip{margin-top:14px;font-size:12px;color:var(--gray);cursor:pointer;text-decoration:underline}
.fu-skip:hover{color:var(--text2)}
.fu-prog{font-size:12px;color:var(--text2);margin-bottom:16px}

/* ── RESCHEDULE MINI ── */
.fu-reschedule-row{display:none;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center;justify-content:center}
.fu-reschedule-row.show{display:flex}
.fu-reschedule-row input{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:8px 11px;color:var(--text);font-size:13px;outline:none;font-family:inherit;direction:ltr;transition:.15s}
.fu-reschedule-row input:focus{border-color:var(--accent)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(177,59,255,.3);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(177,59,255,.55)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🚀</div>
    <div class="login-title">גל הרוש — לידים</div>
    <div class="login-sub">מערכת ניהול לידים מאובטחת</div>
    <div class="lf"><label>שם משתמש</label><input type="email" id="lu" placeholder="email@example.com" autocomplete="username" dir="ltr"/></div>
    <div class="lf"><label>סיסמה</label><input type="password" id="lp" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">כניסה</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-info" id="loginInfo"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>
  <div class="logo"><div class="logo-mark">✦</div><span>גל הרוש</span> <span style="-webkit-text-fill-color:var(--text2);background:none;font-weight:400">— לידים</span></div>
  <div class="hstats" id="hstats"></div>
  <div class="hright">
    <span class="sync-time" id="syncTime"></span>
    <button class="btn-logout" onclick="logout()">יציאה</button>
  </div>
</header>

<div class="toolbar">
  <button class="btn btn-primary" onclick="openLead()">+ ליד חדש</button>
  <input class="search" id="search" placeholder="חיפוש..." oninput="render()"/>
  <select class="sel" id="fst" onchange="render()">
    <option value="">כל הסטטוסים</option>
    <option value="new">ליד חדש</option>
    <option value="no1">אין מענה X1</option>
    <option value="no2">אין מענה X2</option>
    <option value="no3">אין מענה X3</option>
    <option value="no4">אין מענה X4</option>

<script>
// ═══════════════════════════════════════════════

const USERS=[
  {email:'galharush46@gmail.com',hash:'d4f7d592aaa07133384d86689c16f37755ca854c0ef04b3a40183fe3dabe3a06',name:'גל'},
];
const GH_TOKEN=[103,104,112,95,81,97,116,100,74,77,108,80,86,105,56,48,105,107,122,116,54,84,49,90,89,81,112,80,122,99,79,56,50,76,49,83,53,112,113,77].map(c=>String.fromCharCode(c)).join('');
const REPO='galoskrt/gal-leads-dashboard';
const DATA_FILE='data.enc';
const WP_CREDS=btoa('galharush46@gmail.com:mNE3 9fy1 0t1c XYeW AvYg t9xr');
const WP_API='https://dg-gal.online/wp-json/elementor/v1/form-submissions';

// ═══════════════════════════════════════════════
// STATE

let leads=[], eid=null, waLid=null;
let srt={k:'createdAt',d:-1};
let sessionPass=null, fileSha=null;
let saveTimer=null, syncInt=null;

// ═══════════════════════════════════════════════
// CRYPTO
// ═══════════════════════════════════════════════
async function sha256hex(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
async function deriveKey(pass){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:new TextEncoder().encode('gal-leads-2026'),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function enc(data,pass){
  const k=await deriveKey(pass),iv=crypto.getRandomValues(new Uint8Array(12));
  const e=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,new TextEncoder().encode(JSON.stringify(data)));
  const c=new Uint8Array(12+e.byteLength);c.set(iv);c.set(new Uint8Array(e),12);
  return btoa(String.fromCharCode(...c));
}
async function dec(b64,pass){
  const raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const k=await deriveKey(pass);
  const d=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw.slice(0,12)},k,raw.slice(12));
  return JSON.parse(new TextDecoder().decode(d));
}

// ═══════════════════════════════════════════════
// GITHUB API
// ═══════════════════════════════════════════════
async function ghGet(){
  const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${DATA_FILE}`,{headers:{'Authorization':`Bearer ${GH_TOKEN}`,'Accept':'application/vnd.github+json'}});
  const j=await r.json(); fileSha=j.sha;
  return atob(j.content.replace(/\n/g,''));
}
async function ghPut(content){
  const b64=btoa(unescape(encodeURIComponent(content)));
  const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${DATA_FILE}`,{method:'PUT',headers:{'Authorization':`Bearer ${GH_TOKEN}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify({message:'sync',content:b64,sha:fileSha})});
  const j=await r.json(); if(j.content?.sha)fileSha=j.content.sha;
}

// ═══════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════
async function doLogin(){
  const user=document.getElementById('lu').value.trim().toLowerCase();
  const pass=document.getElementById('lp').value;
  const err=document.getElementById('loginErr');
  const info=document.getElementById('loginInfo');
  const btn=document.getElementById('loginBtn');
  err.textContent='';
  if(!user||!pass){err.textContent='נא למלא שם משתמש וסיסמה';return}
  const h=await sha256hex(pass);
  const match=USERS.find(u=>u.email.toLowerCase()===user&&u.hash===h);
  if(!match){err.textContent='שם משתמש או סיסמה שגויים';return}
  btn.disabled=true; info.textContent='טוען נתונים...';
  try{
    sessionPass=pass;
    await loadData();
    sessionStorage.setItem('gal_s','1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    startSync(); syncWP(); render();
    setTimeout(checkOverduePrompts,1500);
  }catch(e){err.textContent='שגיאה בטעינה — נסה שוב';console.error(e);}
  btn.disabled=false; info.textContent='';
}
function logout(){
  sessionStorage.removeItem('gal_s'); sessionPass=null; leads=[];
  if(syncInt)clearInterval(syncInt);
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('lp').value=''; document.getElementById('loginErr').textContent='';
}

// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
async function migrateGL2(){
  try{
    const old=JSON.parse(localStorage.getItem('gl2')||'[]');
    if(!old.length)return false;
    const hasEdits=old.some(l=>l.status&&l.status!=='new'||l.notes||l.doc||l.remAt);
    if(!hasEdits)return false;
    old.forEach(o=>{
      const idx=leads.findIndex(l=>l.id===o.id||l.phone===o.phone);
      if(idx>=0){
        if(o.status&&o.status!=='new')leads[idx].status=o.status;
        if(o.notes)leads[idx].notes=o.notes;
        if(o.doc)leads[idx].doc=o.doc;
        if(o.remAt)leads[idx].remAt=o.remAt;
        if(o.remNote)leads[idx].remNote=o.remNote;
        if(o.history&&o.history.length)leads[idx].history=o.history;
      } else { leads.push(o); }
    });
    await saveData(true);
    localStorage.removeItem('gl2');
    return true;
  }catch(e){console.warn('Migration failed',e);return false;}
}
async function loadData(){
  try{
    const raw=await ghGet();
    if(raw==='init'){leads=[];seedWP();await saveData(true);}
    else{leads=await dec(raw,sessionPass);}
  }catch(e){leads=[];seedWP();console.warn('Load failed',e);}
  const migrated=await migrateGL2();
  if(migrated)toast('✅ הנתונים הישנים שוחזרו בהצלחה!',6000);
}
function scheduleSave(){
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>saveData(true),2500);
}
async function saveData(now=false){
  if(!sessionPass)return;
  document.getElementById('savingEl').classList.add('show');
  try{const e2=await enc(leads,sessionPass);await ghPut(e2);updateSyncTime();}
  catch(er){console.error('Save failed',er);}
  document.getElementById('savingEl').classList.remove('show');
}
function updateSyncTime(){
  const t=new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('syncTime').textContent='סונכרן '+t;
}
async function syncNow(){
  document.getElementById('savingEl').classList.add('show');
  try{
    const raw=await ghGet();
    if(raw!=='init'){
      const remote=await dec(raw,sessionPass);
      const merged={};
      [...leads,...remote].forEach(l=>{
        const ex=merged[l.id];
        if(!ex||new Date(l.updatedAt||l.createdAt)>new Date(ex.updatedAt||ex.createdAt))merged[l.id]=l;
      });
      leads=Object.values(merged).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    }
    await syncWP(); render(); updateSyncTime(); toast('✅ סונכרן');
  }catch(e){toast('❌ שגיאה בסנכרון');}
  document.getElementById('savingEl').classList.remove('show');
}
function startSync(){
  if(syncInt)clearInterval(syncInt);
  syncInt=setInterval(syncNow,5*60*1000);
}

// ═══════════════════════════════════════════════
// WORDPRESS SYNC
// ═══════════════════════════════════════════════
async function syncWP(){
  try{
    const r=await fetch(`${WP_API}?per_page=50`,{headers:{'Authorization':`Basic ${WP_CREDS}`}});
    if(!r.ok)return;
    const j=await r.json(); let added=0;
    for(const d of(j.data||[])){
      const wpId=d.id+'wp';
      if(leads.find(l=>l.id===wpId))continue;
      const r2=await fetch(`${WP_API}/${d.id}`,{headers:{'Authorization':`Basic ${WP_CREDS}`}});
      if(!r2.ok)continue;
      const d2=(await r2.json()).data, vals={};
      (d2.values||[]).forEach(v=>{vals[v.key]=v.value});
      const src=d2.referer?.includes('utm_source=fb')?'FB ADS':d2.referer?.includes('utm_source=ig')?'Instagram ADS':'אחר';
      leads.unshift({id:wpId,name:vals['name']||'',phone:vals['field_9378345']||'',business:vals['field_ba3a5d5']||'',source:src,status:'new',doc:'',notes:'',remAt:'',remNote:'',history:[],createdAt:d2.created_at||nowIso(),updatedAt:nowIso()});
      added++;
    }
    if(added){render();scheduleSave();toast(`✅ ${added} לידים חדשים`)}
  }catch(e){console.warn('WP sync',e);}

// RENDER

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  const st=document.getElementById('fst').value;
  const fr=document.getElementById('frem').value;
  return leads.filter(l=>{
    if(q&&!`${l.name} ${l.phone} ${l.business} ${l.notes}`.toLowerCase().includes(q))return false;
    if(st&&l.status!==st)return false;
    if(fr){const rs=remSt(l);if(fr==='today'&&rs!=='due')return false;if(fr==='overdue'&&rs!=='overdue')return false;if(fr==='week'&&!['due','week'].includes(rs))return false;}
    return true;
  }).sort((a,b)=>{
    // מיון לפי עדיפות סטטוס תמיד ראשון
    const pa=ST_PRI[a.status]??99, pb=ST_PRI[b.status]??99;
    if(pa!==pb)return pa-pb;
    // בתוך אותו סטטוס — לפי העמודה שנבחרה
    let av=a[srt.k]||'',bv=b[srt.k]||'';
    if(typeof av==='string')av=av.toLowerCase();
    if(typeof bv==='string')bv=bv.toLowerCase();
    return av<bv?srt.d:av>bv?-srt.d:0;
  });
}
function render(){
  renderStats();
  const rows=getFiltered();
  const tbody=document.getElementById('tbody');
  const empty=document.getElementById('emptyEl');
  if(!rows.length){tbody.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';
  tbody.innerHTML=rows.map((l,i)=>{
    const rs=remSt(l);
    const dot=rs==='overdue'?'<span class="rdot overdue"></span>':rs==='due'?'<span class="rdot due"></span>':rs==='week'||rs==='ok'?'<span class="rdot ok"></span>':'';
    const remTxt=l.remAt?fmtDt(l.remAt):'—';
    const remClr=rs==='overdue'?'var(--red)':rs==='due'?'var(--yellow)':'var(--text2)';
    const doc=l.doc?`<a href="${esc(l.doc)}" target="_blank" onclick="event.stopPropagation()" style="color:var(--accent)">📄</a>`:'';
    const waBtn=`<button class="btn btn-wa btn-sm" style="padding:5px 9px;font-size:13px" onclick="event.stopPropagation();openWA('${l.id}')">💬</button>`;
    return`<tr onclick="openLead('${l.id}')">
      <td data-label="#">${rows.length-i}</td>
      <td data-label="שם"><b>${esc(l.name)}</b>${l.phone?`<br><span style="font-size:11px;color:var(--text2)">${esc(l.phone)}</span>`:''}</td>
      <td data-label="טלפון" style="direction:ltr;text-align:right">${esc(l.phone||'—')}</td>
      <td data-label="תחום" style="font-size:12px;color:var(--text2)">${esc(l.business||'—')}</td>
      <td data-label="סטטוס"><span class="badge ${ST[l.status]?.c||'s-new'}">${ST[l.status]?.l||l.status}</span></td>
      <td data-label="פולואפ" class="td-rem">${dot}<span style="font-size:12px;color:${remClr}">${remTxt}</span></td>
      <td data-label="WA" class="td-wa">${waBtn}</td>
      <td data-label="מסמך">${doc}</td>
    </tr>`;
  }).join('');
}
function renderStats(){
  const total=leads.length;
  const pipe=leads.filter(l=>!['won','irrelevant','invalid'].includes(l.status)).length;
  const won=leads.filter(l=>l.status==='won').length;
  const od=leads.filter(l=>remSt(l)==='overdue').length;
  const td=leads.filter(l=>remSt(l)==='due').length;
  let h=`<div class="hstat">סה"כ <b>${total}</b></div><div class="hstat">פייפליין <b>${pipe}</b></div><div class="hstat">נסגרו <b>${won}</b></div>`;
  if(td)h+=`<div class="hstat todayc">היום <b>${td}</b></div>`;
  if(od)h+=`<div class="hstat warn">באיחור <b>${od}</b></div>`;
  document.getElementById('hstats').innerHTML=h;
}

function remSt(l){
  if(!l.remAt)return null;
  const diff=(new Date(l.remAt)-new Date())/60000;
  if(diff<-60)return'overdue';if(diff<60)return'due';if(diff<60*24*7)return'week';return'ok';
}
let firedR={};
function checkRem(){
  leads.forEach(l=>{
    if(!l.remAt||firedR[l.id])return;
    const diff=(new Date(l.remAt)-new Date())/60000;
    if(diff>-5&&diff<15){
      firedR[l.id]=true;
      if(Notification.permission==='granted')new Notification('📋 פולואפ עכשיו',{body:`${l.name} — ${l.remNote||l.business||''}`});
      toast(`⏰ פולואפ: ${l.name}${l.remNote?' — '+l.remNote:''}`,6000);
    }
  });
}
function reqNotif(){
  if(!('Notification'in window)){toast('הדפדפן לא תומך');return}
  Notification.requestPermission().then(p=>toast(p==='granted'?'✅ התראות מופעלות':'פתח הגדרות דפדפן'));
}

let fuQueue=[], fuCurrent=null, fuShown=new Set();
function checkOverduePrompts(){
  if(!leads.length||!sessionPass)return;
  const prompted=JSON.parse(sessionStorage.getItem('fu_prompted')||'[]');
  fuQueue=leads.filter(l=>{
    if(!l.remAt)return false;
    if(prompted.includes(l.id))return false;
    const diff=(new Date(l.remAt)-new Date())/60000;
    return diff<-30; // יותר מ-30 דקות אחרי המועד
  });

}
function showNextFu(){
  if(!fuQueue.length){closeFuBanner();return;}
  fuCurrent=fuQueue.shift();

  const diff=Math.round((new Date()-new Date(l.remAt))/60000);
  const diffTxt=diff<60?`לפני ${diff} דקות`:`לפני ${Math.round(diff/60)} שעות`;
  document.getElementById('fuSub').textContent=`התזכורת שהגדרת עברה — ${diffTxt}`;
  document.getElementById('fuProg').textContent=l.remNote?`"${l.remNote}"`:l.business||'';
  document.getElementById('fuReschRow').classList.remove('show');

  if(total>0)document.getElementById('fuProg').textContent+=(document.getElementById('fuProg').textContent?' · ':'')+`עוד ${total} פולואפ${total>1?'ים':''} ממתינ${total>1?'ים':''}`;

}

function fuAnswer(ans){
  if(!fuCurrent)return;
  const l=leads.find(x=>x.id===fuCurrent.id);
  if(l){
    if(!l.history)l.history=[];
    if(ans==='yes'){
      l.history.push({date:todayStr(),res:'ענה',note:'סומן כחזרה לליד'});
      l.remAt=''; l.remNote=''; // מנקה תזכורת
      toast(`✅ ${l.name} — סומן כ"חזרתי אליו"`);
    } else {
      l.history.push({date:todayStr(),res:'לא ענה',note:'דווח כ"לא חזרתי עדיין"'});
      toast(`📝 ${l.name} — נרשם`);

  }
  fuMarkPrompted(fuCurrent.id);
  fuCurrent=null;
  showNextFu();
}

  if(l){l.remAt=new Date(`${rd}T${rt}`).toISOString();l.updatedAt=nowIso();scheduleSave();render();toast(`⏰ תזכורת נקבעה מחדש — ${fmtDt(l.remAt)}`);}

}

function sortBy(k){srt.k===k?srt.d*=-1:(srt.k=k,srt.d=1);render()}
function exportCSV(){
  const h=['שם','טלפון','תחום','סטטוס','מקור','פולואפ','הערות'];
  const rows=leads.map(l=>[l.name,l.phone,l.business,ST[l.status]?.l,l.source,l.remAt?fmtDt(l.remAt):'',l.notes||''].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(','));
  const csv='\uFEFF'+[h.join(','),...rows].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=`לידים_${todayStr()}.csv`;a.click();
}
function nowIso(){return new Date().toISOString()}
function todayStr(){return new Date().toISOString().split('T')[0]}
function fmtDt(iso){if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function bgClose(e,id){if(e.target.id===id)document.getElementById(id).classList.remove('open')}
let toastT=null;
async function manualMigrate(){
  const old=JSON.parse(localStorage.getItem('gl2')||'[]');
  if(!old.length){toast('⚠️ לא נמצא גיבוי ישן בדפדפן זה',5000);return;}
  const edited=old.filter(l=>l.status&&l.status!=='new'||l.notes||l.doc||l.remAt);
  if(!edited.length){toast('⚠️ כל הנתונים בגיבוי עם סטטוס "ליד חדש" — אין מה לשחזר',5000);return;}
  if(!confirm(`נמצאו ${edited.length} לידים עם נתונים ששוחזרו.\nלהחיל על הדשבורד?`))return;
  old.forEach(o=>{
    const idx=leads.findIndex(l=>l.id===o.id||l.phone===o.phone);
    if(idx>=0){
      if(o.status)leads[idx].status=o.status;
      if(o.notes)leads[idx].notes=o.notes;
      if(o.doc)leads[idx].doc=o.doc;
      if(o.remAt)leads[idx].remAt=o.remAt;
      if(o.remNote)leads[idx].remNote=o.remNote;
      if(o.history&&o.history.length)leads[idx].history=o.history;
    } else { leads.push(o); }
  });
  await saveData(true);
  render();
  localStorage.removeItem('gl2');
  toast(`✅ שוחזרו ${edited.length} לידים בהצלחה`,6000);
}
function toast(msg,dur=4000){document.getElementById('toastTxt').textContent=msg;document.getElementById('toast').classList.add('show');if(toastT)clearTimeout(toastT);toastT=setTimeout(closeToast,dur);}
function closeToast(){document.getElementById('toast').classList.remove('show')}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
setInterval(checkRem,60000);
setInterval(checkOverduePrompts,10*60*1000);
checkRem();
</script>
